name: Dozer
options:
  usesTabs: false
  tabWidth: 4
  createIntermediateGroups: true
  xcodeVersion: 26.5
  deploymentTarget:
    macOS: 26.0
targets:
  Dozer:
    type: application
    platform: macOS
    deploymentTarget: 
      macOS: 26.0
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    sources:
      - Dozer
    postBuildScripts:
      - path: Scripts/LaunchAtLogin.sh
        name: Launch At Login
        runOnlyWhenInstalling: true
      - path: Scripts/SignFrameworks.sh
        name: Sign Frameworks
        runOnlyWhenInstalling: true
        runOnlyWhenInstalling: true
      - script: |
          if command -v swiftgen >/dev/null; then
            swiftgen
          else
            echo "error: SwiftGen not installed. Run 'brew bundle --no-upgrade'."
            exit 1
          fi
        name: Generate files using SwiftGen
      - path: Scripts/Swiftlint.sh
        name: Swiftlint
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Dozer/Other/Dozer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: "com.mortennn.Dozer"
        SWIFT_VERSION: 5
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_HARDENED_RUNTIME: true
        ARCHS: "$(ARCHS_STANDARD)"
        MACOSX_DEPLOYMENT_TARGET: 26.0
        ONLY_ACTIVE_ARCH: NO
        SDKROOT: macosx
        SUPPORTED_PLATFORMS: macosx
        VERSIONING_SYSTEM: apple-generic
        CURRENT_PROJECT_VERSION: 30
    dependencies:
      - carthage: LaunchAtLogin
      - carthage: Defaults
      - carthage: Preferences
      - carthage: MASShortcut
      - carthage: Sparkle
schemes:
  Dozer:
    build:
      targets:
        Dozer: all
